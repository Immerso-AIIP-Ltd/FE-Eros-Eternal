name: Eternal Demo Frontend Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        required: true
        default: development

concurrency:
  group: eternal-demo-frontend-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_REPOSITORY: immersoaiip/creator_tools

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          repository: Immerso-AIIP-Ltd/FE-Eros-Eternal
          ref: ${{ github.event.inputs.branch }}

      - name: Set IMAGE_TAG
        run: echo "IMAGE_TAG=eros-wellness-phc-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Clone Helm Charts Repository
        env:
          GIT_USER: ${{ secrets.GIT_OPS_GITHUB_USER }}
          GIT_TOKEN: ${{ secrets.GIT_OPS_GITHUB_TOKEN }}
        run: |
          git clone --depth=1 --branch gcp-eros-univese-dev \
          https://${GIT_USER}:${GIT_TOKEN}@github.com/Immerso-AIIP-Ltd/eros-universe-gcp-helm-charts.git

      - name: Update Helm values.yaml
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          set -euo pipefail

          cd eros-universe-gcp-helm-charts

          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

          yq e '.image.repository = "immersoaiip/creator_tools"' -i eternal-demo-frontend/values.yaml
          yq e '.image.tag = strenv(IMAGE_TAG)' -i eternal-demo-frontend/values.yaml

          echo "Updated values.yaml:"
          cat eternal-demo-frontend/values.yaml

          git add eternal-demo-frontend/values.yaml

          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            git commit -m "chore: update eternal-demo-frontend image to ${IMAGE_TAG}"
            git pull --rebase origin gcp-eros-univese-dev
            git push origin gcp-eros-univese-dev
          fi