name: Dev Workflow

on:
  workflow_dispatch:

concurrency:
  group: dev-deploy
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set IMAGE_TAG
        run: echo "IMAGE_TAG=eternal-wellness-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile  
          push: true
          tags: |
            immersoaiip/creator_tools:${{ env.IMAGE_TAG }}
            immersoaiip/creator_tools:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install yq
        uses: dcarbone/install-yq-action@v1.3.1
        with:
          version: v0.0.0.1
          force: true

      - name: Update Helm Charts Repo
        env:
          GIT_USER: ${{ secrets.GIT_OPS_GITHUB_USER }}
          GIT_TOKEN: ${{ secrets.GIT_OPS_GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          git clone --depth=1 --branch gcp-eros-univese-dev \
            https://${GIT_USER}:${GIT_TOKEN}@github.com/Immerso-AIIP-Ltd/eros-universe-gcp-helm-charts.git

          cd eros-universe-gcp-helm-charts

          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

          # Update Helm values
          yq e '.image.repository = "immersoaiip/creator_tools"' -i ai-tools-model-worker-helm/values.yaml
          yq e '.image.tag = strenv(IMAGE_TAG)' -i eros-eternal-demo/values.yaml

          git add eros-eternal-demo/values.yaml

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update eros-eternal-demo image tag to ${IMAGE_TAG}"
            git pull --rebase origin gcp-eros-univese-dev
            git push origin gcp-eros-univese-dev
          fi
